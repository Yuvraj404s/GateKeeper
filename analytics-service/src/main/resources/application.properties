server.port=8082
spring.application.name=analytics-service

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gatekeeperdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:gatekeeper}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:gatekeeper123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.maximum-pool-size=5

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
