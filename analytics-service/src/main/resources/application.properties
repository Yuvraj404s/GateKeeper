server.port=8082
spring.application.name=analytics-service

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gatekeeperdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:gatekeeper}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:gatekeeper123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10

management.endpoints.web.exposure.include=health,info
