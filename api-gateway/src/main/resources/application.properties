server.port=8080
spring.application.name=api-gateway

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

rate.limiter.service.url=${RATE_LIMITER_URL:http://localhost:8081}

spring.cloud.gateway.routes[0].id=resource-service
spring.cloud.gateway.routes[0].uri=lb://resource-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/resource/**
spring.cloud.gateway.routes[0].filters[0]=RateLimiterFilter

management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always

logging.level.org.springframework.cloud.gateway=INFO
