server.port=${PORT:8080}
spring.application.name=api-gateway

eureka.client.enabled=${EUREKA_ENABLED:false}
spring.cloud.discovery.enabled=${EUREKA_ENABLED:false}

rate.limiter.service.url=${RATE_LIMITER_URL:http://localhost:8081}

# Route to resource service with increased timeout for cold starts
spring.cloud.gateway.routes[0].id=resource-service
spring.cloud.gateway.routes[0].uri=${RESOURCE_SERVICE_URL:http://localhost:8083}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/resource/**
spring.cloud.gateway.routes[0].filters[0]=RateLimiterFilter

# Increase timeouts to handle Render free tier cold starts (60s)
spring.cloud.gateway.httpclient.connect-timeout=60000
spring.cloud.gateway.httpclient.response-timeout=60s

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
