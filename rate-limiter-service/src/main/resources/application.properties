server.port=${PORT:8081}
spring.application.name=rate-limiter-service

spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.ssl.enabled=${REDIS_SSL:false}

eureka.client.enabled=${EUREKA_ENABLED:false}
spring.cloud.discovery.enabled=${EUREKA_ENABLED:false}

analytics.service.url=${ANALYTICS_SERVICE_URL:http://localhost:8082}

rate.limiter.max-requests=5
rate.limiter.window-seconds=60

management.endpoints.web.exposure.include=health,info
