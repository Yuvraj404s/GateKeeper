server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api-gk/ {
        proxy_pass http://api-gateway:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /analytics-gk/ {
        proxy_pass http://analytics-service:8082/;
        proxy_set_header Host $host;
    }

    location /ratelimit-gk/ {
        proxy_pass http://rate-limiter-service:8081/;
        proxy_set_header Host $host;
    }
}
