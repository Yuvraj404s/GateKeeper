server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy → API Gateway on Render
    location /api-gk/ {
        proxy_pass ${API_GATEWAY_URL}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy → Analytics Service on Render
    location /analytics-gk/ {
        proxy_pass ${ANALYTICS_SERVICE_URL}/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy → Rate Limiter Service on Render
    location /ratelimit-gk/ {
        proxy_pass ${RATE_LIMITER_URL}/;
        proxy_set_header Host $host;
    }
}
